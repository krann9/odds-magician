<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odds Magician — Courtyard EV Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
</head>
<body>
  <!-- ═══ HEADER ═══════════════════════════════════════════════════════════ -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">🎯</span>
        <span class="logo-text">ODDS MAGICIAN</span>
      </div>
      <div class="pack-selector">
        <select id="packSelect" class="pack-select">
          <option value="pkmn-basic-pack">Pokémon Basic Pack — $10</option>
          <option value="pkmn-starter-pack">Pokémon Starter Pack — $25</option>
          <option value="pkmn-pro-pack">Pokémon Pro Pack — $50</option>
          <option value="pkmn-master-pack">Pokémon Master Pack — $100</option>
        </select>
      </div>
    </div>

    <div class="header-metrics">
      <div class="metric-card" id="evRatioCard">
        <div class="metric-label">EV RATIO</div>
        <div class="metric-value" id="evRatioVal">—</div>
        <div class="metric-badge" id="evBadge">LOADING…</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">EV (USD)</div>
        <div class="metric-value" id="evUsdVal">—</div>
        <div class="metric-sub" id="packPriceVal">pack cost —</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">CONFIDENCE</div>
        <div class="metric-value" id="confVal">—</div>
        <div class="conf-bar-wrap">
          <div class="conf-bar" id="confBar"></div>
        </div>
      </div>
      <div class="metric-card">
        <div class="metric-label">OBSERVATIONS</div>
        <div class="metric-value" id="obsVal">—</div>
        <div class="metric-sub" id="lastPollVal">last poll —</div>
      </div>
    </div>

    <div class="header-right">
      <div id="pollDot" class="poll-dot dot-idle" title="Polling status"></div>
      <button class="btn-poll" id="btnPoll" onclick="triggerPoll()">↻ Poll Now</button>
    </div>
  </header>

  <!-- ═══ MAIN GRID ════════════════════════════════════════════════════════ -->
  <main class="main-grid">

    <!-- EV Chart -->
    <section class="panel panel-chart">
      <div class="panel-header">
        <span class="panel-title">EV RATIO HISTORY</span>
        <div class="timeframe-btns">
          <button class="tf-btn" data-tf="1H">1H</button>
          <button class="tf-btn" data-tf="6H">6H</button>
          <button class="tf-btn tf-active" data-tf="24H">24H</button>
          <button class="tf-btn" data-tf="7D">7D</button>
          <button class="tf-btn" data-tf="ALL">ALL</button>
        </div>
        <span class="panel-hint">Break-even = 1.00</span>
      </div>
      <div class="chart-wrap">
        <canvas id="evChart"></canvas>
      </div>
    </section>

    <!-- Calibration / Odds Buckets -->
    <section class="panel panel-odds">
      <div class="panel-header">
        <span class="panel-title">CALIBRATED ODDS</span>
        <span class="panel-hint" id="oddsTimestamp">—</span>
      </div>
      <div id="bucketsContainer" class="buckets-container">
        <div class="loading-msg">Loading calibration data…</div>
      </div>
    </section>

    <!-- Recent Pulls -->
    <section class="panel panel-pulls">
      <div class="panel-header">
        <span class="panel-title">🔥 JUST PULLED</span>
        <span class="panel-hint" id="pullCount">— pulls logged</span>
      </div>
      <div id="pullFeed" class="pull-feed">
        <div class="loading-msg">Loading pull history…</div>
      </div>
    </section>

  </main>

  <!-- ═══ FOOTER ════════════════════════════════════════════════════════════ -->
  <footer class="footer">
    <span>Odds Magician — data from Courtyard.io API</span>
    <span id="footerStatus" class="footer-status">Initialising…</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
