<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odds Magician — Coming Soon</title>
  <style>
    :root {
      --bg-deep:  #070b14;
      --bg-card:  #0d1320;
      --border:   #1e2d45;
      --green:    #00d68f;
      --gold:     #ffc107;
      --text:     #e2e8f0;
      --text-dim: #4a5568;
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle animated grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(30,45,69,0.25) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,45,69,0.25) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 56px 64px;
      max-width: 540px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 80px rgba(0,214,143,0.06), 0 8px 40px rgba(0,0,0,0.6);
    }

    /* Top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      border-radius: 2px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--green);
      background: rgba(0,214,143,0.08);
      border: 1px solid rgba(0,214,143,0.2);
      border-radius: 4px;
      padding: 4px 10px;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    .logo {
      font-size: 13px;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--text) 0%, #7a8fa8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 13px;
      color: #7a8fa8;
      line-height: 1.7;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 -12px 32px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Odds Magician</div>
    <div class="badge">Under Development</div>
    <h1>Something better<br>is coming.</h1>
    <p class="subtitle">
      Live EV tracking for Courtyard mystery packs is being rebuilt
      with new features. Check back soon.
    </p>
    <div class="divider"></div>
    <div class="status-row">
      <span class="dot"></span>
      <span>In progress</span>
    </div>
  </div>
</body>
</html>
